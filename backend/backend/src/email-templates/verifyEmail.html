<!doctype html>
<html lang="en">
  <body style="margin:0;background:#f5f7fb;font-family:Arial,sans-serif;color:#0f172a">
    <div style="max-width:600px;margin:32px auto;background:#fff;padding:32px">
      <h1 style="font-size:22px">Verify your email</h1>
      <p>Hello {{name}}, verify your email address to activate sign-in for Stock Register.</p>
      <p>
        <a href="{{verifyUrl}}" style="display:inline-block;background:#2563eb;color:#fff;padding:12px 20px;text-decoration:none;border-radius:4px">
          Verify email
        </a>
      </p>
      <p style="font-size:12px;color:#64748b">This link expires in 24 hours.</p>
    </div>
  </body>
</html>
